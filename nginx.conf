server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bot API (/bot/* → bot:8081/*)
    location /bot/ {
        rewrite ^/bot(/.*) $1 break;
        proxy_pass http://asyncti4-bot:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket
    location /ws {
        proxy_pass http://asyncti4-bot:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Game images served from bot classpath
    location /images/ {
        proxy_pass http://asyncti4-bot:8081/images/;
        proxy_set_header Host $host;
    }

    # Games list (/proxy/maps.json → bot /api/public/games)
    location = /proxy/maps.json {
        proxy_pass http://asyncti4-bot:8081/api/public/games;
        proxy_set_header Host $host;
    }

    # Game webdata (/proxy/webdata/{gameId}/* → bot /api/public/game/{gameId}/webdata)
    location ~ ^/proxy/webdata/([^/]+)/ {
        proxy_pass http://asyncti4-bot:8081/api/public/game/$1/webdata;
        proxy_set_header Host $host;
    }

    # Discord auth service (runs on Docker host)
    location /auth/ {
        rewrite ^/auth(/.*) $1 break;
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
